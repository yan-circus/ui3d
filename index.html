<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>EduPlanet — Prototype</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at 28% 38%, #0d1535 0%, #060612 65%);
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas { display: block; }

    #back-btn {
      position: fixed;
      top: 20px; left: 20px;
      padding: 9px 20px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.85);
      font-size: 13px; letter-spacing: 0.5px;
      cursor: pointer; display: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: background 0.2s;
      z-index: 30;
    }
    #back-btn:hover { background: rgba(255,255,255,0.15); }

    #title {
      position: fixed; top: 22px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.5);
      font-size: 11px; letter-spacing: 3.5px;
      text-transform: uppercase;
      pointer-events: none; white-space: nowrap;
      z-index: 30;
    }

    #version {
      position: fixed; top: 22px; right: 20px;
      color: rgba(255,255,255,0.75);
      font-size: 10px; letter-spacing: 1.5px;
      pointer-events: none; z-index: 30;
    }

    #hint {
      position: fixed; bottom: 26px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.18);
      font-size: 11px; letter-spacing: 1.5px;
      pointer-events: none; white-space: nowrap;
    }

    .label {
      position: fixed; pointer-events: none;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.8);
      font-size: 10px; font-weight: 700;
      letter-spacing: 2.5px; text-transform: uppercase;
      text-shadow: 0 2px 14px rgba(0,0,0,1), 0 0 6px rgba(0,0,0,0.8);
      display: none; white-space: nowrap;
    }

    #toast {
      position: fixed; bottom: 56px; left: 50%;
      transform: translateX(-50%);
      background: rgba(12,14,32,0.88);
      border: 1px solid rgba(255,255,255,0.13);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.88);
      padding: 11px 26px; border-radius: 24px;
      font-size: 13px; letter-spacing: 0.8px;
      pointer-events: none; opacity: 0;
      transition: opacity 0.4s; white-space: nowrap;
      z-index: 10;
    }

    /* ── PANEL OVERLAY ──────────────────────────────────────────────── */
    #panel-overlay {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0;
      transition: opacity 0.35s;
      z-index: 20;
    }

    /* Panel conçu à résolution fixe — mis à l'échelle via JS (applyPanelScale) */
    .family-panel {
      width: var(--panel-w);
      height: var(--panel-h);
      border-radius: var(--panel-radius);
      padding: var(--pad-top) var(--pad-h) var(--pad-bot);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transform-origin: center center;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .family-panel-header {
      font-size: var(--title-sz);
      font-weight: 700;
      letter-spacing: var(--title-ls);
      text-align: center;
      margin-bottom: var(--sep-margin);
      flex-shrink: 0;
    }

    .family-panel-sep {
      height: 0; border: none; border-top: 1px solid;
      margin-bottom: var(--grid-margin);
      flex-shrink: 0;
    }

    .family-panel-grid {
      display: grid;
      gap: var(--gap);
      overflow-y: auto;
      flex: 1;
      align-content: start;
      padding: var(--grid-pad-top) var(--grid-pad-right) var(--grid-pad-top) var(--grid-pad-top);
    }

    .family-panel-grid::-webkit-scrollbar { width: 4px; }
    .family-panel-grid::-webkit-scrollbar-track { background: transparent; }
    .family-panel-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    .level-card {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: var(--card-gap);
      padding: var(--card-pad-v) var(--card-pad-h);
      border-radius: var(--card-radius);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: default; font-family: inherit;
      transition: transform 0.15s, background 0.15s, box-shadow 0.15s;
      min-height: var(--card-min-h);
    }

    .level-card:not(.locked) { cursor: pointer; }
    .level-card:not(.locked):hover {
      transform: scale(1.04);
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
    }
    .level-card:not(.locked):active { transform: scale(0.97); }

    .level-name {
      font-size: var(--level-sz);
      font-weight: 700;
      letter-spacing: 0.5px; text-align: center;
      color: rgba(255,255,255,0.9); line-height: 1.3;
    }

    .level-stars { font-size: var(--stars-sz); letter-spacing: 2px; }
    .star-filled { color: #ffcc44; }
    .star-empty  { color: rgba(255,255,255,0.2); }
    .lock-icon   { font-size: var(--lock-sz); opacity: 0.35; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <button id="back-btn">← Retour</button>
  <div id="title">Choisir une activité</div>
  <div id="hint">Glisser pour tourner · Cliquer pour explorer</div>
  <div id="toast"></div>
  <div id="version">v0.9.5</div>
  <div id="panel-overlay"></div>

  <script type="importmap">
  {"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}
  </script>

  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/debug.js"></script>
</body>
</html>
